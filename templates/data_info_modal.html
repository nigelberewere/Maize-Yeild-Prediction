<!-- Modal for data source information -->
<div class="modal fade" id="dataInfoModal" tabindex="-1" aria-labelledby="dataInfoModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="dataInfoModalLabel">Data Sources and Dataset Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <pre style="white-space:pre-wrap; font-size:0.9rem;">{{ data_info_text }}</pre>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
